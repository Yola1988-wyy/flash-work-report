<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{DECK_TITLE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F5F7;
    --card:#FFFFFF;
    --ink:#15171C;
    --slate:#646B79;
    --mute:#9AA1AD;
    --line:#ECEDF1;
    --line-2:#E2E4E9;
    --dark:#0F1115;
    --dark-2:#171A21;
    --dark-card:#1B1F27;
    --yellow:#FFEA33;
    --yellow-deep:#EAD400;
    --yellow-soft:#FFF7B8;
    --chart-gray:#C9CDD6;
    --chart-gray-2:#DFE2E8;
    --blue:#2F6BFF;
    --green:#16a34a;

    --f-sans:'Sora','Noto Sans SC',-apple-system,system-ui,sans-serif;
    --f-cn:'Noto Sans SC','PingFang SC',-apple-system,system-ui,sans-serif;
    --shadow:0 1px 2px rgba(16,18,25,.04),0 10px 30px rgba(16,18,25,.05);
    --shadow-sm:0 1px 2px rgba(16,18,25,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;width:100%;overflow:hidden;background:#000;font-family:var(--f-cn);color:var(--ink);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

  /* ============ deck ============ */
  .deck{position:relative;width:100vw;height:100vh;overflow:hidden}
  .slide{position:absolute;inset:0;opacity:0;visibility:hidden;transition:opacity .6s ease;overflow:hidden}
  .slide.active{opacity:1;visibility:visible;z-index:2}
  .slide-inner{position:absolute;inset:0;padding:56px 72px 60px;display:flex;flex-direction:column}
  .bg-light{background:var(--bg)}
  .bg-dark{background:var(--dark);color:#fff}

  .bg-light::before{content:"";position:absolute;inset:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:48px 48px;opacity:.4;pointer-events:none;mask-image:radial-gradient(ellipse 90% 80% at 70% 30%,#000 30%,transparent 75%)}

  /* ============ slide chrome ============ */
  .chrome-top{display:flex;justify-content:space-between;align-items:center;font-family:var(--f-sans);font-size:12px;letter-spacing:.04em;color:var(--slate);z-index:5}
  .chrome-top .brand{display:flex;align-items:center;gap:10px;font-weight:500}
  .chrome-top .brand .dot{width:7px;height:7px;border-radius:2px;background:var(--yellow)}
  .chrome-top img.logo{margin-right:12px}
  .bg-dark .chrome-top{color:rgba(255,255,255,.55)}
  .chrome-bot{position:absolute;left:72px;right:72px;bottom:24px;display:flex;justify-content:space-between;align-items:center;font-family:var(--f-sans);font-size:11px;letter-spacing:.04em;color:var(--mute);z-index:5}
  .bg-dark .chrome-bot{color:rgba(255,255,255,.4)}

  /* ============ section header ============ */
  .shead{display:flex;align-items:flex-start;gap:20px;margin-top:30px;margin-bottom:26px}
  .shead .accent{width:5px;align-self:stretch;min-height:56px;background:var(--yellow);border-radius:3px;margin-top:4px}
  .shead .snum{font-family:var(--f-sans);font-size:13px;font-weight:600;color:var(--mute);letter-spacing:.1em;margin-bottom:8px}
  .shead h2{font-family:var(--f-cn);font-size:34px;font-weight:700;letter-spacing:-.01em;line-height:1.15}
  .shead h2 .hl{background:linear-gradient(transparent 62%,var(--yellow) 62%);padding:0 2px}
  .shead .kicker{font-family:var(--f-sans);font-size:13px;color:var(--slate);font-weight:500;margin-top:8px;display:flex;gap:8px;align-items:center}
  .tags{display:flex;gap:8px;margin-left:auto;align-self:center}
  .tag{font-family:var(--f-cn);font-size:12px;font-weight:500;padding:6px 14px;border-radius:99px;background:#fff;border:1px solid var(--line-2);color:var(--slate)}
  .tag.solid{background:var(--yellow);border-color:var(--yellow);color:var(--ink);font-weight:600}

  /* ============ cards ============ */
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:26px 28px;position:relative}
  .card-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px}
  .card-h .t{font-family:var(--f-cn);font-size:15px;font-weight:600;color:var(--ink)}
  .card-h .m{font-family:var(--f-sans);font-size:12px;color:var(--mute);font-weight:500}
  .card-label{font-family:var(--f-cn);font-size:13px;color:var(--slate);font-weight:500}

  /* ============ KPI hero ============ */
  .kpi{display:flex;flex-direction:column;justify-content:center;gap:6px}
  .kpi .num{font-family:var(--f-sans);font-weight:700;font-size:96px;line-height:.9;letter-spacing:-.03em;color:var(--ink);display:flex;align-items:baseline;gap:6px}
  .kpi .num .u{font-size:.26em;color:var(--slate);font-weight:600;letter-spacing:0}
  .kpi .num .up{font-size:.34em;color:var(--yellow-deep);font-weight:700}
  .kpi .lbl{font-family:var(--f-cn);font-size:14px;color:var(--slate);font-weight:500;margin-top:6px}
  .kpi .note{font-family:var(--f-cn);font-size:13px;color:var(--mute);line-height:1.5;margin-top:10px;max-width:240px}
  .kpi-accent{position:absolute;top:26px;left:0;width:5px;height:40px;background:var(--yellow);border-radius:0 3px 3px 0}

  /* ============ body grids ============ */
  .grid-3{display:grid;grid-template-columns:.85fr 1.45fr .9fr;gap:20px;flex:1;min-height:0}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;flex:1;min-height:0}
  .grid-ba{display:grid;grid-template-columns:.62fr 1.5fr;gap:20px;flex:1;min-height:0}
  .grid-util{display:grid;grid-template-columns:.78fr 1.4fr;gap:20px;flex:1;min-height:0}

  /* ============ bar chart ============ */
  .barlist{display:flex;flex-direction:column;gap:7px}
  .bar-row{display:grid;grid-template-columns:74px 1fr 34px;gap:12px;align-items:center}
  .bar-row .lbl{font-family:var(--f-cn);font-size:12px;color:var(--slate);text-align:right;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar-row .val{font-family:var(--f-sans);font-size:12px;font-weight:600;color:var(--ink);text-align:left}
  .bar-track{height:13px;background:#F1F2F5;border-radius:7px;overflow:hidden}
  .bar-fill{height:100%;width:0;border-radius:7px;background:var(--ink);transition:width 1s cubic-bezier(.22,1,.36,1);transition-delay:calc(var(--i,0)*45ms)}
  .bar-row.top .bar-fill{background:var(--yellow);box-shadow:inset 0 0 0 1px var(--yellow-deep)}
  .bar-row.hi .bar-fill{background:#3A3E48}
  .bar-row:hover .bar-fill{filter:brightness(1.04)}

  /* ============ donut ============ */
  .donut-wrap{display:flex;flex-direction:column;gap:18px;align-items:center;justify-content:center}
  .donut{position:relative;width:172px;height:172px}
  .donut svg{width:100%;height:100%;transform:rotate(-90deg)}
  .donut svg circle{transition:stroke-dasharray 1s cubic-bezier(.22,1,.36,1)}
  .donut-c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .donut-c .v{font-family:var(--f-sans);font-size:40px;font-weight:700;line-height:1;color:var(--ink);letter-spacing:-.02em}
  .donut-c .l{font-family:var(--f-cn);font-size:11px;color:var(--mute);margin-top:5px;font-weight:500}
  .donut-legend{display:flex;flex-direction:column;gap:9px;width:100%}
  .donut-legend li{display:grid;grid-template-columns:12px 1fr auto;gap:9px;align-items:center;font-family:var(--f-cn);font-size:13px;list-style:none;color:var(--slate)}
  .donut-legend .sw{width:12px;height:12px;border-radius:4px}
  .donut-legend b{font-family:var(--f-sans);font-weight:600;color:var(--ink)}

  /* ============ metric stack ============ */
  .mstack{display:flex;flex-direction:column;gap:16px}
  .metric-card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow-sm);padding:22px 24px}
  .metric-card.accent{background:var(--ink);color:#fff;border-color:var(--ink)}
  .metric-card .v{font-family:var(--f-sans);font-weight:700;font-size:62px;line-height:.9;letter-spacing:-.03em;display:flex;align-items:baseline;gap:2px}
  .metric-card .v .u{font-size:.34em;color:var(--slate);font-weight:600}
  .metric-card.accent .v{color:var(--yellow)}
  .metric-card.accent .v .u{color:rgba(255,255,255,.55)}
  .metric-card .l{font-family:var(--f-cn);font-size:14px;font-weight:600;color:var(--ink);margin-top:8px}
  .metric-card.accent .l{color:#fff}
  .metric-card .n{font-family:var(--f-cn);font-size:12.5px;color:var(--mute);line-height:1.5;margin-top:6px}
  .metric-card.accent .n{color:rgba(255,255,255,.6)}

  /* ============ before / after ============ */
  .ba-slider{position:relative;width:100%;height:100%;min-height:380px;overflow:hidden;border-radius:18px;background:#0d0d0d;cursor:ew-resize;user-select:none;border:1px solid var(--line);box-shadow:var(--shadow)}
  .ba-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;pointer-events:none}
  .ba-img.after-clip{clip-path:inset(0 0 0 50%)}
  .ba-handle{position:absolute;top:0;bottom:0;left:50%;width:3px;background:var(--yellow);transform:translateX(-50%);pointer-events:none;box-shadow:0 0 16px rgba(0,0,0,.5)}
  .ba-handle::before{content:"";position:absolute;top:50%;left:50%;width:44px;height:44px;background:var(--yellow);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 6px 20px rgba(0,0,0,.4)}
  .ba-handle::after{content:"⇄";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--f-sans);font-size:18px;font-weight:700;color:var(--ink);z-index:2}
  .ba-label{position:absolute;top:16px;font-family:var(--f-cn);font-size:12px;font-weight:600;letter-spacing:.04em;padding:6px 12px;border-radius:8px;z-index:3;backdrop-filter:blur(8px);transition:opacity .3s ease}
  .ba-label.before{left:16px;background:rgba(0,0,0,.55);color:#fff}
  .ba-label.after{right:16px;background:var(--yellow);color:var(--ink)}

  /* ============ efficiency comparison ============ */
  .eff-card{display:flex;flex-direction:column;padding:28px 30px}
  .eff-flag{display:flex;align-items:center;gap:10px;font-family:var(--f-cn);font-size:14px;font-weight:600;color:var(--slate)}
  .eff-flag .chip{font-family:var(--f-sans);font-size:11px;font-weight:700;letter-spacing:.06em;padding:3px 9px;border-radius:6px;background:var(--yellow);color:var(--ink)}
  .eff-name{font-family:var(--f-cn);font-size:30px;font-weight:700;margin-top:10px;margin-bottom:6px}
  .eff-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 20px;margin-top:18px}
  .eff-stat{padding-top:14px;border-top:1px solid var(--line)}
  .eff-stat .v{font-family:var(--f-sans);font-size:40px;font-weight:700;letter-spacing:-.02em;line-height:1}
  .eff-stat .v.acc{color:var(--yellow-deep)}
  .eff-stat .l{font-family:var(--f-cn);font-size:12.5px;color:var(--slate);margin-top:7px;font-weight:500}
  .eff-stat .n{font-family:var(--f-cn);font-size:12px;color:var(--mute);margin-top:4px}
  .eff-stat .n b{color:var(--yellow-deep);font-weight:700}
  .eff-foot{margin-top:18px;background:var(--ink);color:#fff;border-radius:16px;padding:20px 26px;font-family:var(--f-cn);font-size:15px;line-height:1.55;font-weight:400}
  .eff-foot b{color:var(--yellow);font-weight:600}

  /* ============ grouped bars (utilities) ============ */
  .gbars{display:flex;flex-direction:column;gap:22px;margin-top:6px}
  .gbar-row .gl{font-family:var(--f-cn);font-size:13px;font-weight:600;color:var(--ink);margin-bottom:11px}
  .gbar{display:grid;grid-template-columns:1fr 92px;gap:14px;align-items:center;margin-bottom:9px}
  .gbar .barwrap{position:relative;height:26px}
  .gbar .track{position:absolute;inset:0;background:#F1F2F5;border-radius:8px}
  .gbar .fill{position:relative;height:100%;width:0;border-radius:8px;transition:width 1s cubic-bezier(.22,1,.36,1);transition-delay:calc(var(--i,0)*90ms)}
  .gbar.feb .fill{background:var(--chart-gray)}
  .gbar.mar .fill{background:var(--yellow)}
  .gbar .mtag{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-family:var(--f-cn);font-size:12px;font-weight:600;color:var(--ink);white-space:nowrap}
  .gbar.feb .mtag{color:#5a5f6a}
  .gbar .vlbl{font-family:var(--f-sans);font-size:14px;font-weight:600;color:var(--ink);white-space:nowrap}
  .gbar .delta{font-family:var(--f-sans);font-size:11px;font-weight:600;color:var(--yellow-deep);margin-left:5px}

  /* ============ line chart ============ */
  .line-chart-wrap{position:relative;width:100%;height:140px;margin-top:6px}
  .line-chart-wrap svg{width:100%;height:100%}

  /* ============ team ============ */
  .team-card{display:flex;flex-direction:column;padding:30px 32px}
  .team-tag{display:inline-flex;align-items:center;gap:9px;font-family:var(--f-cn);font-size:14px;font-weight:600;color:var(--slate)}
  .team-tag .ix{font-family:var(--f-sans);font-size:12px;font-weight:700;color:var(--ink);background:var(--yellow);width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center}
  .team-title{font-family:var(--f-cn);font-size:28px;font-weight:700;margin-top:14px;margin-bottom:22px;letter-spacing:-.01em}
  .team-item{display:grid;grid-template-columns:38px 1fr;gap:16px;padding:18px 0;border-top:1px solid var(--line)}
  .team-item .n{font-family:var(--f-sans);font-size:22px;font-weight:700;color:var(--yellow-deep);line-height:1}
  .team-item .b{font-family:var(--f-cn);font-size:14.5px;line-height:1.6;color:#3a3e48}
  .team-item .b b{font-weight:700;color:var(--ink);background:linear-gradient(transparent 62%,var(--yellow-soft) 62%)}

  /* ============ cover ============ */
  .cover{display:grid;grid-template-columns:1.2fr .8fr;gap:0px;flex:1;align-items:center}
  .cover-l{display:flex;flex-direction:column}
  .cover-eyebrow{font-family:var(--f-sans);font-size:14px;font-weight:500;letter-spacing:.06em;color:var(--yellow);display:flex;align-items:center;gap:12px}
  .cover-eyebrow::before{content:"";width:32px;height:2px;background:var(--yellow);border-radius:2px}
  .cover-title{font-family:var(--f-cn);font-weight:900;font-size:clamp(56px,6.6vw,92px);line-height:1.04;letter-spacing:-.02em;color:#fff;margin-top:26px}
  .cover-title .hl{color:var(--yellow)}
  .cover-sub{font-family:var(--f-cn);font-size:18px;color:rgba(255,255,255,.6);margin-top:24px;line-height:1.6;max-width:520px;font-weight:300}
  .cover-meta{display:flex;gap:48px;margin-top:48px;padding-top:28px;border-top:1px solid rgba(255,255,255,.12)}
  .cover-meta dt{font-family:var(--f-cn);font-size:12px;color:rgba(255,255,255,.45);margin-bottom:8px;font-weight:400}
  .cover-meta dd{font-family:var(--f-cn);font-size:19px;color:#fff;font-weight:600}

  /* cover dashboard mockup */
  .cover-r{display:flex;align-items:center;justify-content:center;position:relative}
  .dash-stage{position:relative;width:100%;max-width:480px}
  .dash-float{animation:floatY 5.5s ease-in-out infinite}
  .dash-card{background:#fff;border-radius:22px;padding:22px 22px 18px;box-shadow:0 36px 80px rgba(0,0,0,.5),0 6px 18px rgba(0,0,0,.28);transform:rotate(-1.3deg);color:var(--ink)}
  .dash-head{display:flex;flex-direction:column;gap:11px;margin-bottom:6px}
  .dash-title{font-family:var(--f-cn);font-size:17px;font-weight:700;color:#1b2330}
  .dash-legend{display:flex;gap:15px}
  .dash-legend span{display:flex;align-items:center;gap:6px;font-family:var(--f-cn);font-size:12.5px;color:#6b7280;font-weight:500}
  .dash-legend i{width:9px;height:9px;border-radius:50%}
  .dash-chartwrap{position:relative}
  .dash-badge{position:absolute;top:2px;right:2px;background:#E7F8EF;color:#16a34a;font-family:var(--f-sans);font-size:12.5px;font-weight:700;padding:4px 11px;border-radius:99px}
  .dash-chart{width:100%;height:auto;display:block;margin-top:2px}
  .dash-mini{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:12px}
  .mini{background:#F8F9FB;border:1px solid #EEF0F3;border-radius:13px;padding:11px 12px}
  .mini .mh{display:flex;align-items:center;gap:5px;font-family:var(--f-cn);font-size:11px;color:#6b7280;font-weight:500;margin-bottom:5px}
  .mini .mrow{display:flex;align-items:center;gap:8px}
  .mini .mv{font-family:var(--f-sans);font-size:21px;font-weight:700;color:#1b2330;letter-spacing:-.02em;line-height:1}
  .mini .mv.g{color:#16a34a}
  .mini svg{display:block}

  /* floating chips */
  .fchip{position:absolute;background:#fff;border-radius:15px;box-shadow:0 18px 44px rgba(0,0,0,.34);padding:11px 15px;display:flex;align-items:center;gap:11px;font-family:var(--f-cn);color:var(--ink);z-index:3}
  .fchip .ico{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;font-weight:700}
  .fchip.sync{top:-18px;right:-4px;animation:floatY 4.3s ease-in-out infinite}
  .fchip.sync .ico{background:#E7F8EF;color:#16a34a}
  .fchip.sync .tx{font-size:15px;font-weight:700;color:#1b2330}
  .fchip.active{bottom:118px;right:-28px;flex-direction:column;align-items:flex-start;gap:2px;padding:12px 18px;animation:floatY 5s ease-in-out .5s infinite}
  .fchip.active .l{font-size:12px;color:#6b7280;font-weight:500}
  .fchip.active .v{font-family:var(--f-sans);font-size:24px;font-weight:700;color:#8B5CF6;letter-spacing:-.02em}
  .fchip.mile{bottom:-20px;left:-24px;animation:floatY 3.9s ease-in-out .3s infinite}
  .fchip.mile .ico{background:#FFF3C0;color:#b8960a}
  .fchip.mile .t{font-size:14px;font-weight:700;color:#1b2330;line-height:1.2}
  .fchip.mile .s{font-size:11.5px;color:#6b7280;font-weight:500;margin-top:2px}
  @keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  @media (prefers-reduced-motion:reduce){.dash-float,.fchip{animation:none!important}}

  /* ============ thanks ============ */
  .thanks{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative}
  .thanks .te{font-family:var(--f-sans);font-size:14px;letter-spacing:.16em;color:var(--yellow);margin-bottom:24px;font-weight:500}
  .thanks .th{font-family:var(--f-cn);font-size:clamp(72px,11vw,140px);font-weight:900;color:#fff;letter-spacing:.04em;line-height:1}
  .thanks .ts{font-family:var(--f-cn);font-size:18px;color:rgba(255,255,255,.55);margin-top:24px;font-weight:300}
  .thanks .tsig{display:flex;gap:56px;margin-top:56px;padding-top:28px;border-top:1px solid rgba(255,255,255,.12)}
  .thanks .tsig div{display:flex;flex-direction:column;gap:6px}
  .thanks .tsig dt{font-family:var(--f-cn);font-size:12px;color:rgba(255,255,255,.4)}
  .thanks .tsig dd{font-family:var(--f-cn);font-size:17px;color:#fff;font-weight:600}
  .thanks-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,rgba(255,234,51,.16),transparent 65%);filter:blur(20px);pointer-events:none;z-index:0}
  .thanks>*:not(.thanks-glow){position:relative;z-index:1}

  /* ============ navigation ============ */
  .sidenav{position:fixed;right:26px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:7px;z-index:55;align-items:center}
  .sidedot{position:relative;width:24px;height:20px;background:transparent;border:none;padding:0;margin:0;cursor:pointer;display:flex;align-items:center;justify-content:center;outline:none;-webkit-tap-highlight-color:transparent}
  .sidedot::-moz-focus-inner{border:none}
  .sidedot:focus{outline:none!important;box-shadow:none!important;border:none!important}
  .sidedot::before{content:"";width:11px;height:11px;border-radius:50%;background:rgba(20,22,28,.2);transition:transform .25s cubic-bezier(.34,1.56,.64,1),background .25s,box-shadow .25s}
  .sidedot:hover::before{transform:scale(1.4);background:rgba(20,22,28,.5)}
  .sidedot.active::before{background:var(--yellow);box-shadow:0 0 0 4px rgba(255,234,51,.22);transform:scale(1.15)}
  .sidenav.on-dark .sidedot::before{background:rgba(255,255,255,.28)}
  .sidenav.on-dark .sidedot:hover::before{background:rgba(255,255,255,.65)}
  .sidenav.on-dark .sidedot.active::before{background:var(--yellow);box-shadow:0 0 0 4px rgba(255,234,51,.3)}
  .sidedot .tip{position:absolute;right:24px;top:50%;transform:translateY(-50%) translateX(8px);opacity:0;pointer-events:none;white-space:nowrap;background:var(--ink);color:#fff;font-family:var(--f-cn);font-size:12.5px;font-weight:500;padding:7px 13px;border-radius:10px;transition:opacity .22s,transform .22s;box-shadow:0 12px 32px rgba(0,0,0,.28);letter-spacing:.01em}
  .sidedot .tip b{color:var(--yellow);font-family:var(--f-sans);font-weight:600;margin-right:6px}
  .sidedot .tip::after{content:"";position:absolute;left:100%;top:50%;transform:translateY(-50%);border:5px solid transparent;border-left-color:var(--ink)}
  .sidedot:hover .tip{opacity:1;transform:translateY(-50%) translateX(0)}

  .progress{position:fixed;top:0;left:0;height:3px;background:var(--yellow);z-index:60;transition:width .5s cubic-bezier(.22,1,.36,1)}

  /* entrance anim */
  .slide.active .au{animation:au .6s cubic-bezier(.22,1,.36,1) both}
  .slide.active .au1{animation:au .6s cubic-bezier(.22,1,.36,1) .08s both}
  .slide.active .au2{animation:au .6s cubic-bezier(.22,1,.36,1) .16s both}
  .slide.active .au3{animation:au .6s cubic-bezier(.22,1,.36,1) .24s both}
  .slide.active .au4{animation:au .6s cubic-bezier(.22,1,.36,1) .32s both}
  .slide.active .fade{animation:fade .8s ease both}
  @keyframes au{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fade{from{opacity:0}to{opacity:1}}

  /* modal */
  .modal{position:fixed;inset:0;background:rgba(12,14,18,.9);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px);cursor:zoom-out;padding:56px}
  .modal.open{display:flex;animation:fade .25s ease both}
  .modal img{max-width:100%;max-height:100%;border-radius:8px;box-shadow:0 30px 80px rgba(0,0,0,.6)}
  .modal-cap{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);font-family:var(--f-cn);font-size:13px;color:rgba(255,255,255,.7)}
  .modal-close{position:absolute;top:22px;right:22px;width:42px;height:42px;border-radius:12px;background:var(--yellow);color:var(--ink);border:none;font-size:18px;cursor:pointer;font-family:var(--f-sans);font-weight:700}
  .zoomable{cursor:zoom-in}

  .logo{height:36px;width:auto;display:block}
  .logo-dark{filter:none;opacity:1}

  @media (max-width:1280px){.slide-inner{padding:40px 48px 52px}.chrome-bot{left:48px;right:48px}.grid-3,.grid-util,.grid-ba{grid-template-columns:1fr}.cover{grid-template-columns:1fr;gap:32px}}
</style>
</head>
<body>

<div class="progress" id="progress"></div>

<div class="deck" id="deck">

<!-- ============================================================ -->
<!-- SLIDES INSERTION POINT                                       -->
<!--                                                              -->
<!-- 在此处按顺序插入 <section class="slide ..." data-title="...">  -->
<!-- ...</section> 块。首张 slide 必须带 class="active"。           -->
<!-- data-title 用作右侧 dot 悬停 tooltip。                        -->
<!-- chrome-bot 末尾的页码可写 "-- / --" 或留空,JS 会自动填充。     -->
<!-- ============================================================ -->

</div>

<nav class="sidenav" id="sidenav" aria-label="幻灯片导航"></nav>

<div class="modal" id="modal" role="dialog" aria-modal="true">
  <button class="modal-close" id="modalClose" aria-label="关闭">✕</button>
  <img id="modalImg" src="" alt="放大查看">
  <div class="modal-cap" id="modalCap">点击任意区域关闭</div>
</div>

<script>
/* ============================================================ */
/*  scaffold.js — 风格令牌锁死,所有数据来自 slide HTML 属性     */
/*  禁止在此文件硬编码业务数据,所有 data-* 由 slide 模板携带     */
/* ============================================================ */

const slides=document.querySelectorAll('.slide');
const total=slides.length;
let cur=Array.from(slides).findIndex(s=>s.classList.contains('active'));
if(cur<0){cur=0;slides[0]&&slides[0].classList.add('active');}
const titles=Array.from(slides).map(s=>s.dataset.title||'');

/* build right-side dot navigation */
const sidenav=document.getElementById('sidenav');
let lastGoTime=0;
slides.forEach((s,i)=>{
  const b=document.createElement('button');
  b.className='sidedot';
  b.setAttribute('aria-label',titles[i]);
  b.innerHTML='<span class="tip"><b>'+String(i+1).padStart(2,'0')+'</b>'+titles[i]+'</span>';
  b.addEventListener('click',e=>{e.stopPropagation();const now=Date.now();if(now-lastGoTime<300)return;lastGoTime=now;go(i);b.blur();});
  sidenav.appendChild(b);
});
const sidedots=sidenav.querySelectorAll('.sidedot');

/* auto-fill chrome-bot page numbers (matches "XX / N", "-- / --", or empty last span) */
slides.forEach((s,i)=>{
  const segs=s.querySelectorAll('.chrome-bot span');
  if(segs.length>=2){
    const last=segs[segs.length-1];
    const t=last.textContent.trim();
    if(t===''||/^(\d+|--)\s*\/\s*(\d+|--)$/.test(t)){
      last.textContent=String(i+1).padStart(2,'0')+' / '+String(total).padStart(2,'0');
    }
  }
});

function paintBars(slide){
  slide.querySelectorAll('.bar-fill').forEach(b=>{b.style.width='0';requestAnimationFrame(()=>b.style.width=b.dataset.w+'%');});
  slide.querySelectorAll('.gbar .fill').forEach(f=>{f.style.width='0';requestAnimationFrame(()=>f.style.width=f.dataset.w+'%');});
}
function animateCounter(id,target,duration){
  const el=document.getElementById(id);if(!el)return;
  const start=performance.now();
  function update(now){
    const elapsed=now-start;
    const progress=Math.min(elapsed/duration,1);
    const eased=1-Math.pow(1-progress,3);
    el.textContent=Math.round(eased*target);
    if(progress<1)requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}
function fireCounters(slide){
  slide.querySelectorAll('[data-counter-to]').forEach(el=>{
    if(!el.id) el.id='kpiN_'+Math.random().toString(36).slice(2,8);
    animateCounter(el.id,+el.dataset.counterTo,1500);
  });
}
function updateNav(){
  sidedots.forEach((d,idx)=>d.classList.toggle('active',idx===cur));
  sidenav.classList.toggle('on-dark',slides[cur].classList.contains('bg-dark'));
  document.getElementById('progress').style.width=((cur+1)/total*100)+'%';
}
function go(i){
  i=(i+total)%total;
  if(i===cur)return;
  slides[cur].classList.remove('active');
  slides[i].classList.add('active');
  cur=i;
  updateNav();
  requestAnimationFrame(()=>paintBars(slides[cur]));
  fireCounters(slides[cur]);
}
document.addEventListener('keydown',e=>{
  if(['ArrowRight','ArrowDown','PageDown',' '].includes(e.key)){e.preventDefault();sidedots.forEach(d=>d.blur());go(cur+1);}
  else if(['ArrowLeft','ArrowUp','PageUp'].includes(e.key)){e.preventDefault();sidedots.forEach(d=>d.blur());go(cur-1);}
  else if(e.key==='Home')go(0);
  else if(e.key==='End')go(total-1);
  else if(e.key==='Escape')closeModal();
});
let baDragSuppressClick=false;
document.addEventListener('click',e=>{
  if(baDragSuppressClick){baDragSuppressClick=false;return;}
  if(e.target.closest('.sidenav,.modal,.ba-slider,.zoomable,button,a,img,.card,.kcard')) return;
  (e.clientX/window.innerWidth>.5)?go(cur+1):go(cur-1);
});
updateNav();

/* ---- bar chart renderer (data-driven via [data-bars]) ---- */
function renderBars(el,data,topN){
  const max=Math.max(...data.map(d=>d.v));
  el.innerHTML=data.map((d,i)=>{
    const w=(d.v/max)*100;const cls=i===0?'top':(i<topN?'hi':'');
    return `<div class="bar-row ${cls}" style="--i:${i}"><span class="lbl">${d.l}</span><div class="bar-track"><div class="bar-fill" data-w="${w}" style="width:${w}%"></div></div><span class="val">${d.v}</span></div>`;
  }).join('');
}
document.querySelectorAll('[data-bars]').forEach(el=>{
  try{
    const data=JSON.parse(el.dataset.bars);
    const topN=+(el.dataset.barsTopn||0);
    renderBars(el,data,topN);
  }catch(err){console.warn('bad data-bars on',el,err);}
});

/* ---- donut renderer (data-driven via [data-donut]) ---- */
function donut(el,legendEl,data,colors){
  const tot=data.reduce((s,d)=>s+d.v,0);
  const size=172,r=66,cx=size/2,cy=size/2,C=2*Math.PI*r;let acc=0;
  const arcs=data.map((d,i)=>{const frac=d.v/tot;const dash=frac*C;const off=-acc*C;acc+=frac;
    return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${colors[i]}" stroke-width="26" stroke-dasharray="${dash} ${C-dash}" stroke-dashoffset="${off}" stroke-linecap="butt"/>`;}).join('');
  const top=data.reduce((m,d)=>d.v>m.v?d:m,data[0]);
  el.innerHTML=`<svg viewBox="0 0 ${size} ${size}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#F1F2F5" stroke-width="26"/>${arcs}</svg><div class="donut-c"><span class="v">${Math.round(top.v/tot*100)}%</span><span class="l">${top.l} 占比最高</span></div>`;
  if(legendEl){
    legendEl.innerHTML=data.map((d,i)=>`<li><span class="sw" style="background:${colors[i]}"></span><span>${d.l}</span><span><b>${d.v}</b> · ${Math.round(d.v/tot*100)}%</span></li>`).join('');
  }
}
document.querySelectorAll('[data-donut]').forEach(el=>{
  try{
    const data=JSON.parse(el.dataset.donut);
    const colors=JSON.parse(el.dataset.donutColors||'["#FFEA33","#15171C","#9AA1AD","#D6DAE1","#C9CDD6","#DFE2E8"]');
    const legendEl=el.dataset.donutLegend?document.getElementById(el.dataset.donutLegend):null;
    donut(el,legendEl,data,colors);
  }catch(err){console.warn('bad data-donut on',el,err);}
});

/* ---- before/after slider (auto-activates if #baSlider exists) ---- */
(function(){
  const slider=document.getElementById('baSlider');if(!slider)return;
  const after=document.getElementById('afterImg');const handle=document.getElementById('baHandle');
  const labelBefore=slider.querySelector('.ba-label.before');
  const labelAfter=slider.querySelector('.ba-label.after');
  const beforeSrc=slider.dataset.beforeSrc||'assets/before.png';
  const afterSrc=slider.dataset.afterSrc||'assets/after.png';
  let dragging=false,autoTimer=null;
  function setPct(p){p=Math.max(0,Math.min(100,p));after.style.clipPath=`inset(0 0 0 ${p}%)`;handle.style.left=`${p}%`;
    labelAfter.style.opacity=p>=96?0:(p<=4?1:'');
    labelBefore.style.opacity=p<=4?0:(p>=96?1:'');
  }
  function fromEvent(e){const r=slider.getBoundingClientRect();const x=(e.touches?e.touches[0].clientX:e.clientX)-r.left;setPct(x/r.width*100);}
  function endDrag(e){if(!dragging)return;dragging=false;baDragSuppressClick=true;if(e&&e.stopPropagation)e.stopPropagation();}
  slider.addEventListener('mousedown',e=>{e.stopPropagation();dragging=true;stopAuto();fromEvent(e);});
  window.addEventListener('mousemove',e=>{if(dragging)fromEvent(e);});
  window.addEventListener('mouseup',endDrag);
  slider.addEventListener('touchstart',e=>{e.stopPropagation();dragging=true;stopAuto();fromEvent(e);});
  slider.addEventListener('touchmove',e=>{if(dragging){e.preventDefault();e.stopPropagation();fromEvent(e);}},{passive:false});
  window.addEventListener('touchend',endDrag);
  function startAuto(){stopAuto();let dir=1,p=50;autoTimer=setInterval(()=>{if(dragging){stopAuto();return;}p+=dir*0.6;if(p>=96)dir=-1;if(p<=4){stopAuto();setPct(50);return;}setPct(p);},16);}
  function stopAuto(){if(autoTimer){clearInterval(autoTimer);autoTimer=null;}}
  const ob=new MutationObserver(()=>{const on=slider.closest('.slide').classList.contains('active');if(on){setPct(50);setTimeout(startAuto,700);}else stopAuto();});
  ob.observe(slider.closest('.slide'),{attributes:true,attributeFilter:['class']});
  slider.addEventListener('dblclick',e=>{const r=slider.getBoundingClientRect();const x=(e.clientX-r.left)/r.width*100;const isAfter=x>parseFloat(handle.style.left||'50');openModal(isAfter?afterSrc:beforeSrc,isAfter?'优化后':'优化前');});
})();

/* ---- line chart renderer (data-driven via [data-line]) ---- */
function renderLineChart(el,data,color,yMax,animate){
  const w=el.clientWidth||300;
  const h=el.clientHeight||120;
  const maxY=yMax||Math.max(...data.map(d=>d.v))*1.1;
  const padding=18;
  const chartW=w-padding*2,chartH=h-padding*2;
  const points=data.map((d,i)=>({x:padding+i*(chartW/(data.length-1)),y:padding+chartH-(d.v/maxY)*chartH}));
  const pathD='M'+points.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' L');
  const areaD=pathD+` L${points[points.length-1].x.toFixed(1)},${h-padding} L${padding},${h-padding} Z`;
  const id=el.id||('lc_'+Math.random().toString(36).slice(2,8));el.id=id;
  const gridLines=[];
  for(let i=0;i<=3;i++){
    const y=padding+i*(chartH/3);
    const val=maxY*(1-i/3);
    gridLines.push(`<line x1="${padding}" y1="${y.toFixed(1)}" x2="${w-padding}" y2="${y.toFixed(1)}" stroke="#ECEDF1" stroke-dasharray="3 3"/>`);
    gridLines.push(`<text x="${padding-3}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="9" fill="#9AA1AD" font-family="Sora,sans-serif">${val.toFixed(0)}</text>`);
  }
  const dots=data.map((d,i)=>`<circle class="line-dot" cx="${points[i].x.toFixed(1)}" cy="${points[i].y.toFixed(1)}" r="3" fill="#fff" stroke="${color}" stroke-width="2"/>`).join('');
  const xLabels=data.map((d,i)=>`<text class="line-label" x="${points[i].x.toFixed(1)}" y="${h-padding+1}" text-anchor="middle" font-size="9" fill="#9AA1AD" font-family="Sora,sans-serif">${d.l}</text>`).join('');
  const animStyle=animate?`<style>
    @keyframes drawLine{to{stroke-dashoffset:0}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .line-path{stroke-dasharray:2000;stroke-dashoffset:2000;animation:drawLine 1.8s cubic-bezier(.22,1,.36,1) forwards}
    .line-area{animation:fadeIn .6s ease .8s both}
    .line-dot{animation:fadeIn .4s ease 1.4s both}
    .line-label{animation:fadeIn .4s ease 1.6s both}
  </style>`:'<style>.line-dot,.line-label{opacity:1}</style><style>.line-path{stroke-dasharray:none;stroke-dashoffset:0}</style>';
  el.innerHTML=`<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">
    ${animStyle}
    <defs><linearGradient id="grad${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity=".15"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    ${gridLines.join('')}
    <path class="line-area" d="${areaD}" fill="url(#grad${id})"/>
    <path class="line-path" d="${pathD}" stroke="${color}" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
    ${xLabels}
  </svg>`;
}

/* ---- modal ---- */
const modal=document.getElementById('modal'),modalImg=document.getElementById('modalImg'),modalCap=document.getElementById('modalCap');
function openModal(src,cap){modalImg.src=src;modalCap.textContent=(cap?cap+' · ':'')+'点击任意区域关闭';modal.classList.add('open');}
function closeModal(){modal.classList.remove('open');}
modal.addEventListener('click',closeModal);
document.getElementById('modalClose').addEventListener('click',e=>{e.stopPropagation();closeModal();});

/* init line charts after load (needs computed sizes) */
window.addEventListener('load',()=>{
  setTimeout(()=>{
    document.querySelectorAll('[data-line]').forEach(el=>{
      try{
        const data=JSON.parse(el.dataset.line);
        const color=el.dataset.lineColor||'#FFEA33';
        const yMax=el.dataset.lineYmax?+el.dataset.lineYmax:undefined;
        const animate=el.dataset.lineAnimate!=='false';
        renderLineChart(el,data,color,yMax,animate);
      }catch(err){console.warn('bad data-line on',el,err);}
    });
  },300);
});

/* init for the first active slide */
requestAnimationFrame(()=>{
  paintBars(slides[cur]);
  fireCounters(slides[cur]);
});
</script>
</body>
</html>
