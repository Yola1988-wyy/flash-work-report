<!--
  10-section-overview.html · 章节概览(KPI + 横条 + 环形,grid-3 布局)
  适用:有一个统领性大数 + 一组排序明细 + 一组占比分布

  必填 TOKEN:
    {{BRAND_TEXT}}      顶部品牌行。例:"Flash HR · 季度工作汇报"
    {{PERIOD}}          顶部右侧期次。例:"2026 第一季度"
    {{DATA_TITLE}}      slide 短标题(给 data-title 用)。例:"HR 线:需求上线概览"
    {{SNUM}}            章节编号。例:"01"
    {{H_PREFIX}}        h2 标题前半。例:"HR 线:"
    {{H_HL}}            h2 标题高亮部分(黄色背景)。例:"需求上线概览"

    {{KPI_TARGET}}      KPI 计数目标值(整数)。例:106
    {{KPI_UP_ARROW}}    是否显示 ↑(填 '<span class="up">↑</span>' 或空字符串)
    {{KPI_LBL}}         KPI 下方标签。例:"完成上线总数"
    {{KPI_NOTE}}        KPI 说明。1~2 行短句

    {{BAR_TITLE}}       横条卡片标题。例:"业务方上线需求分布"
    {{BAR_META}}        横条卡片右侧 meta。例:"降序排列 · 共 151 项"
    {{BAR_DATA}}        JSON 数组:[{"l":"HR Product","v":39},...]
    {{BAR_TOPN}}        前 N 项用深灰色(其中第 1 项用黄色)。例:3

    {{DONUT_TITLE}}     环形卡片标题。例:"优先级分布"
    {{DONUT_META}}      环形卡片右侧 meta。例:"共 153 项"
    {{DONUT_DATA}}      JSON 数组:[{"l":"P1","v":114},...]
    {{DONUT_COLORS}}    JSON 数组(可选):["#FFEA33","#15171C","#9AA1AD","#D6DAE1"]
                        缺省走 scaffold 默认色板
    {{DONUT_LEGEND_ID}} legend 元素 ID(必须与 data-donut-legend 匹配,全 deck 内唯一)
    {{DONUT_ID}}        donut 元素 ID(全 deck 内唯一)
-->
<section class="slide bg-light" data-title="{{DATA_TITLE}}">
  <div class="slide-inner">
    <div class="chrome-top"><div class="brand"><span class="dot"></span>{{BRAND_TEXT}}</div><div>{{PERIOD}}</div></div>

    <div class="shead">
      <div class="accent"></div>
      <div>
        <div class="snum au">{{SNUM}}</div>
        <h2 class="au">{{H_PREFIX}}<span class="hl">{{H_HL}}</span></h2>
      </div>
    </div>

    <div class="grid-3">
      <div class="card kpi au1">
        <div class="kpi-accent"></div>
        <div class="num"><span data-counter-to="{{KPI_TARGET}}">0</span>{{KPI_UP_ARROW}}</div>
        <div class="lbl">{{KPI_LBL}}</div>
        <div class="note">{{KPI_NOTE}}</div>
      </div>

      <div class="card au2">
        <div class="card-h"><span class="t">{{BAR_TITLE}}</span><span class="m">{{BAR_META}}</span></div>
        <div class="barlist" data-bars='{{BAR_DATA}}' data-bars-topn="{{BAR_TOPN}}"></div>
      </div>

      <div class="card au3">
        <div class="card-h"><span class="t">{{DONUT_TITLE}}</span><span class="m">{{DONUT_META}}</span></div>
        <div class="donut-wrap">
          <div class="donut" id="{{DONUT_ID}}" data-donut='{{DONUT_DATA}}' data-donut-colors='{{DONUT_COLORS}}' data-donut-legend="{{DONUT_LEGEND_ID}}"></div>
          <ul class="donut-legend" id="{{DONUT_LEGEND_ID}}"></ul>
        </div>
      </div>
    </div>

    <div class="chrome-bot"><span></span><span>-- / --</span></div>
  </div>
</section>
