<!--
  50-quad-line.html · 多维趋势(2×2 折线图 + 底注)
  适用:4 个同等重要的折线趋势指标(可缺省 1~2 个,使用 .card 占位即可)

  必填 TOKEN:
    {{BRAND_TEXT}}/{{PERIOD}}/{{DATA_TITLE}}/{{SNUM}}/{{H_PREFIX}}/{{H_HL}}/{{KICKER}}/{{TAGS}}
                            同 20 模板

    4 个折线卡(C1~C4):
    {{C1_TITLE}}/{{C1_META}}    标题 + 单位 meta。例:"报销油费金额趋势" / "单位:万元"
    {{C1_ID}}                   元素 ID,全 deck 内唯一。例:"lineChart1"
    {{C1_DATA}}                 JSON 数组:[{"l":"1月","v":2735715.22},...]
    {{C1_YMAX}}                 Y 轴最大值(可省,缺省自动)
    {{C1_COLOR}}                折线色(可省,缺省 #FFEA33)
    C2/C3/C4 同上

    {{FOOT_HTML}}               底注 HTML(可省,留空则不显示;支持 <b> 强调)

  注意:
    - 4 个折线 ID 必须互不相同,且全 deck 内唯一
    - data-line 属性值必须是合法 JSON(转义双引号或用单引号包裹)
    - 此模板 .shead 用了较小的 margin-top/bottom 以腾出空间给 4 卡 + 底注
-->
<section class="slide bg-light" data-title="{{DATA_TITLE}}">
  <div class="slide-inner">
    <div class="chrome-top"><div class="brand"><span class="dot"></span>{{BRAND_TEXT}}</div><div>{{PERIOD}}</div></div>

    <div class="shead" style="margin-top:16px;margin-bottom:14px">
      <div class="accent"></div>
      <div>
        <div class="snum au">{{SNUM}}</div>
        <h2 class="au">{{H_PREFIX}}<span class="hl">{{H_HL}}</span></h2>
        <div class="kicker au">{{KICKER}}</div>
      </div>
      <div class="tags au1">{{TAGS}}</div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:1;min-height:0">
      <div class="card au1" style="padding:12px">
        <div class="card-h"><span class="t">{{C1_TITLE}}</span><span class="m">{{C1_META}}</span></div>
        <div class="line-chart-wrap" id="{{C1_ID}}" data-line='{{C1_DATA}}' data-line-ymax="{{C1_YMAX}}" data-line-color="{{C1_COLOR}}"></div>
      </div>
      <div class="card au2" style="padding:12px">
        <div class="card-h"><span class="t">{{C2_TITLE}}</span><span class="m">{{C2_META}}</span></div>
        <div class="line-chart-wrap" id="{{C2_ID}}" data-line='{{C2_DATA}}' data-line-ymax="{{C2_YMAX}}" data-line-color="{{C2_COLOR}}"></div>
      </div>
      <div class="card au3" style="padding:12px">
        <div class="card-h"><span class="t">{{C3_TITLE}}</span><span class="m">{{C3_META}}</span></div>
        <div class="line-chart-wrap" id="{{C3_ID}}" data-line='{{C3_DATA}}' data-line-ymax="{{C3_YMAX}}" data-line-color="{{C3_COLOR}}"></div>
      </div>
      <div class="card au4" style="padding:12px">
        <div class="card-h"><span class="t">{{C4_TITLE}}</span><span class="m">{{C4_META}}</span></div>
        <div class="line-chart-wrap" id="{{C4_ID}}" data-line='{{C4_DATA}}' data-line-ymax="{{C4_YMAX}}" data-line-color="{{C4_COLOR}}"></div>
      </div>
    </div>

    <div class="eff-foot au3">{{FOOT_HTML}}</div>

    <div class="chrome-bot"><span></span><span>-- / --</span></div>
  </div>
</section>
