<!--
  99-thanks.html · 感谢页(固定布局,只替换占位符)

  必填 TOKEN:
    {{THANKS_EYEBROW}}      顶部 eyebrow 文字。例:"2026 第一季度工作汇报"
    {{THANKS_SUB}}          副标题/落款语。例:"落实行动,拿到结果 —— 我们下个季度见"
    {{PRESENTER}}/{{DEPT}}/{{REPORT_DATE}}    与封面一致

  注意:此 slide 通常是 deck 中最后一张。
-->
<section class="slide bg-dark" data-title="感谢聆听">
  <div class="slide-inner">
    <div class="chrome-top"><img src="assets/logo-White.png" alt="Flash" class="logo logo-dark"></div>

    <div class="thanks">
      <div class="thanks-glow fade"></div>
      <div class="te au">{{THANKS_EYEBROW}}</div>
      <div class="th au1">感谢聆听</div>
      <div class="ts au2">{{THANKS_SUB}}</div>
      <dl class="tsig au3">
        <div><dt>汇报人</dt><dd>{{PRESENTER}}</dd></div>
        <div><dt>汇报部门</dt><dd>{{DEPT}}</dd></div>
        <div><dt>汇报时间</dt><dd>{{REPORT_DATE}}</dd></div>
      </dl>
    </div>
  </div>
</section>
